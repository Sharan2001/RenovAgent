<!DOCTYPE html>
<html>
<head>
    <title>RenovAgent</title>
</head>
<body>

<h2>RenovAgent</h2>
<p>Active Agent: <span id="agent">Bob</span></p>

<button id="record">🎤 Hold to Record</button>

<p><b>You:</b> <span id="userText"></span></p>
<p><b>Assistant:</b> <span id="assistantText"></span></p>

<script>
let mediaRecorder;
let audioChunks = [];

const recordBtn = document.getElementById("record");

recordBtn.onmousedown = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

            const formData = new FormData();
            formData.append("file", audioBlob, "audio.webm");

            const response = await fetch("/voice", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                console.error("Server error:", errorText);
                return;
            }

            const data = await response.json();

            document.getElementById("userText").innerText = data.transcript;
            document.getElementById("assistantText").innerText = data.response;
            document.getElementById("agent").innerText = data.agent;

            const audio = new Audio("data:audio/mp3;base64," + data.audio);
            audio.play();
        };

        mediaRecorder.start();
    } catch (err) {
        console.error("Microphone error:", err);
    }
};

recordBtn.onmouseup = () => {
    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }
};
</script>

</body>
</html>
